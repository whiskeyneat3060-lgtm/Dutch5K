<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dutch 5K &#8212; Vocab Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#111111; --paper:#FFFFFF; --grey:#F2F2EF;
    --red:#DD0100; --blue:#225095; --yellow:#FAC901;
    --rule:3px solid var(--ink);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Inter',sans-serif; color:var(--ink); background:var(--paper);
    display:flex; flex-direction:column; min-height:100vh;
  }
  header{
    border-bottom:var(--rule); padding:14px 16px;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .logo{font-family:'Archivo',sans-serif; font-weight:900; font-size:20px; letter-spacing:-0.5px;}
  .logo span{color:var(--red);}
  .counter{font-family:'Archivo',sans-serif; font-weight:700; font-size:13px; text-align:right; line-height:1.2;}
  .counter small{display:block; font-weight:400; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#666;}

  nav{display:flex; border-bottom:var(--rule);}
  nav button{
    flex:1; padding:12px 4px; background:var(--paper); border:none; border-right:var(--rule);
    font-family:'Archivo',sans-serif; font-weight:700; font-size:13px; text-transform:uppercase;
    letter-spacing:1px; cursor:pointer; color:var(--ink);
  }
  nav button:last-child{border-right:none;}
  nav button.active{background:var(--ink); color:var(--paper);}

  main{flex:1; padding:16px; max-width:640px; width:100%; margin:0 auto; padding-bottom:48px;}

  .mstrip{display:flex; height:22px; border:var(--rule); margin:16px 0;}
  .mstrip div{border-right:3px solid var(--ink);}
  .mstrip div:last-child{border-right:none;}
  .m-learned{background:var(--blue);}
  .m-learning{background:var(--yellow);}
  .m-new{background:var(--paper);}

  .card{
    border:var(--rule); background:var(--paper); min-height:300px;
    display:flex; flex-direction:column; cursor:pointer;
  }
  .card-tag{
    font-size:10px; letter-spacing:2px; text-transform:uppercase; font-weight:600;
    padding:8px 12px; border-bottom:var(--rule); display:flex; justify-content:space-between;
  }
  .card-body{flex:1; display:flex; flex-direction:column; justify-content:center; padding:24px 20px; gap:8px;}
  .word-nl{font-family:'Archivo',sans-serif; font-weight:900; font-size:44px; letter-spacing:-1px; line-height:1; word-break:break-word;}
  .word-hint{font-size:12px; color:#888; margin-top:12px;}
  .word-en{font-size:20px; font-weight:600; color:var(--blue);}
  .rankline{font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#999; margin-top:2px;}
  .forms{margin-top:12px; font-size:13px; line-height:1.75;}
  .forms .frow b{font-weight:600; display:inline-block; min-width:96px; color:#444;}
  .chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:12px;}
  .chip{font-size:11.5px; font-weight:600; padding:4px 9px; border:2px solid var(--ink);}
  .chip.syn{background:var(--grey);}
  .chip.ant{background:var(--yellow);}
  .sentence{margin-top:10px; padding-left:10px; border-left:4px solid var(--yellow); font-size:14px; line-height:1.5;}
  .sentence em{display:block; font-style:normal; color:#666; font-size:12.5px;}

  .actions{display:flex; gap:0; margin-top:14px; border:var(--rule);}
  .actions button{
    flex:1; padding:14px 6px; border:none; cursor:pointer; background:var(--paper);
    font-family:'Archivo',sans-serif; font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:0.5px;
  }
  .actions button + button{border-left:var(--rule);}
  .actions button.btn-again{color:var(--red);}
  .actions button.btn-learning{background:var(--yellow);}
  .actions button.btn-know{background:var(--blue); color:#fff;}

  .deckinfo{font-size:12px; color:#666; margin-top:10px; text-align:center;}

  .filters{display:flex; gap:0; border:var(--rule); margin-bottom:12px;}
  .filters button{flex:1; padding:9px 2px; border:none; background:var(--paper); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer;}
  .filters button + button{border-left:var(--rule);}
  .filters button.active{background:var(--ink); color:#fff;}
  input[type=search], input[type=password], input[type=text]{
    width:100%; padding:11px 12px; border:var(--rule); font-family:'Inter'; font-size:14px; margin-bottom:12px; outline:none;
  }
  .wrow{
    border:2px solid var(--ink); border-bottom:none; padding:10px 12px;
    display:flex; align-items:center; justify-content:space-between; gap:10px; cursor:pointer;
  }
  .wlist .wrow:last-of-type{border-bottom:2px solid var(--ink);}
  .wrow .nl{font-family:'Archivo'; font-weight:700; font-size:15px;}
  .wrow .en{font-size:13px; color:#555;}
  .dot{width:14px; height:14px; border:2px solid var(--ink); flex-shrink:0;}
  .dot.learned{background:var(--blue);} .dot.learning{background:var(--yellow);} .dot.new{background:#fff;}
  .wdetail{border:2px solid var(--ink); border-top:none; padding:12px; font-size:13px; background:var(--grey);}
  .loadmore{width:100%; padding:12px; margin-top:10px; background:var(--paper); border:var(--rule); font-family:'Archivo'; font-weight:700; text-transform:uppercase; letter-spacing:1px; cursor:pointer;}

  .stats{display:grid; grid-template-columns:1fr 1fr; border:var(--rule);}
  .stat{padding:18px 14px; border-right:3px solid var(--ink); border-bottom:3px solid var(--ink);}
  .stat:nth-child(2n){border-right:none;}
  .stat:nth-last-child(-n+2){border-bottom:none;}
  .stat .num{font-family:'Archivo'; font-weight:900; font-size:34px; line-height:1;}
  .stat .lbl{font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:#666; margin-top:6px;}
  .c-blue{color:var(--blue);} .c-yellow{color:#b89200;} .c-red{color:var(--red);}

  .genbox{border:var(--rule); padding:16px; margin-top:18px;}
  .genbox h3{font-family:'Archivo'; font-weight:900; font-size:16px; text-transform:uppercase; letter-spacing:0.5px;}
  .genbox p{font-size:13px; color:#555; margin:8px 0 12px; line-height:1.5;}
  .genbtn{
    width:100%; padding:14px; background:var(--red); color:#fff; border:var(--rule);
    font-family:'Archivo'; font-weight:900; font-size:14px; text-transform:uppercase; letter-spacing:1px; cursor:pointer;
  }
  .genbtn.alt{background:var(--blue);}
  .genbtn:disabled{background:#999; cursor:wait;}
  .note{font-size:11.5px; color:#888; margin-top:10px; line-height:1.5;}
  .keyok{font-size:12px; font-weight:600; color:var(--blue); margin-bottom:8px;}
  .toast{
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; font-size:13px; font-weight:600;
    opacity:0; pointer-events:none; transition:opacity .25s; z-index:99; max-width:90vw; text-align:center;
  }
  .toast.show{opacity:1;}
  .empty{border:var(--rule); padding:32px 20px; text-align:center; font-size:14px; color:#555;}
  .rowbtns{display:flex; gap:10px; margin-top:12px;}
  .rowbtns button{flex:1; padding:12px; background:var(--paper); border:var(--rule); font-family:'Archivo'; font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer;}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
  button:focus-visible, input:focus-visible, .card:focus-visible{outline:3px solid var(--red); outline-offset:2px;}

  /* ---- v4: rich sections ---- */
  .section{margin-top:16px; border-top:2px solid var(--ink); padding-top:10px; text-align:left;}
  .sec-h{font-family:'Archivo',sans-serif; font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:#666; margin-bottom:8px;}
  .frow{font-size:13px; line-height:1.7;}
  .frow b{font-weight:600; display:inline-block; min-width:96px; color:#444;}
  .rel{display:flex; align-items:center; gap:8px; padding:8px 10px; border:2px solid var(--ink); margin-bottom:6px; cursor:pointer; background:var(--paper);}
  .rel-plain{cursor:default; opacity:0.85;}
  .rel-syn{border-left:6px solid var(--blue);}
  .rel-ant{border-left:6px solid var(--yellow);}
  .rel-w{font-family:'Archivo'; font-weight:700; font-size:14px; white-space:nowrap;}
  .rel-m{flex:1; font-size:12.5px; color:#555;}
  .rel-go{font-family:'Archivo'; font-weight:900; font-size:18px; color:var(--red);}
  .rel-plain .rel-go{display:none;}

  /* ---- POS filters ---- */
  .posfilters{display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap;}
  .posfilters.posscroll{flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:4px;}
  .posfilters button{
    flex:0 0 auto; padding:7px 12px; border:2px solid var(--ink); background:var(--paper);
    font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer; white-space:nowrap;
  }
  .posfilters button.active{background:var(--ink); color:#fff;}
  .learn-pos{margin-top:0;}
  .wpos{font-family:'Inter'; font-weight:500; font-size:9px; text-transform:uppercase; letter-spacing:1px; color:#999; border:1px solid #ccc; padding:1px 5px; vertical-align:middle;}
  .btn-skip{color:#666; font-size:12px !important;}

  /* ---- daily plan / streak ---- */
  .plan-box{border-width:3px;}
  .daily-head{display:flex; justify-content:space-between; align-items:center; margin:6px 0 10px;}
  .daily-num{font-family:'Archivo'; font-weight:900; font-size:36px; line-height:1;}
  .daily-num span{font-size:18px; color:#999;}
  .streak-badge{font-family:'Archivo'; font-weight:900; font-size:26px; text-align:right; line-height:1;}
  .streak-badge small{display:block; font-family:'Inter'; font-weight:400; font-size:9px; text-transform:uppercase; letter-spacing:1px; color:#666;}
  .progbar{height:14px; border:2px solid var(--ink); background:var(--paper);}
  .progbar-fill{height:100%; background:var(--blue); transition:width .3s;}
  .plan-form label{display:block; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:#666; margin-bottom:6px;}
  .chiprow{display:flex; gap:6px; flex-wrap:wrap;}
  .planchip{flex:1; min-width:48px; padding:12px 0; border:var(--rule); background:var(--paper); font-family:'Archivo'; font-weight:900; font-size:16px; cursor:pointer;}
  .planchip:hover{background:var(--yellow);}
  input[type=date]{width:100%; padding:11px 12px; border:var(--rule); font-family:'Inter'; font-size:14px; outline:none;}

  .histgrid{display:grid; grid-template-columns:repeat(14,1fr); gap:4px;}
  .histcell{aspect-ratio:1; border:2px solid var(--ink);}
  .histcell.lvl0{background:var(--paper);}
  .histcell.lvl1{background:#bcd;}
  .histcell.lvl2{background:#6b9;}
  .histcell.lvl3{background:var(--blue);}

  .posbreak{display:flex; flex-direction:column; gap:8px;}
  .posrow{display:flex; align-items:center; gap:10px; cursor:pointer;}
  .posname{flex:0 0 96px; font-size:13px; font-weight:600;}
  .posbar{flex:1; height:12px; border:2px solid var(--ink); background:var(--paper);}
  .posbar-fill{display:block; height:100%; background:var(--blue);}
  .poscount{flex:0 0 auto; font-family:'Archivo'; font-weight:700; font-size:12px; color:#444;}
</style>
</head>
<body>

<header>
  <div class="logo">DUTCH<span>&#183;</span>5K</div>
  <div class="counter"><small>Words learned</small><span id="hdrCount">0 / 5000</span></div>
</header>

<nav>
  <button id="tabLearn" class="active" onclick="setTab('learn')">Learn</button>
  <button id="tabWords" onclick="setTab('words')">Words</button>
  <button id="tabProgress" onclick="setTab('progress')">Progress</button>
</nav>

<main id="main"></main>
<div class="toast" id="toast"></div>

<script>
/* ============ STORAGE ADAPTER ============ */
const Store = {
  hasClaude: typeof window.storage !== 'undefined',
  async get(k){
    if(this.hasClaude){
      try{ const r = await window.storage.get(k); return r ? JSON.parse(r.value) : null; }
      catch(e){ return null; }
    }
    try{ const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; }catch(e){ return null; }
  },
  async set(k,v){
    if(this.hasClaude){
      try{ await window.storage.set(k, JSON.stringify(v)); }catch(e){ console.error(e); }
      return;
    }
    try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){ toast('Storage full &#8212; export your progress'); }
  }
};

/* ============ DECK ============ */
/* Every entry has a stable id. Curated/enriched entries: "word|type". Stubs: "word".
   Progress and enrichment are stored against ids, so nothing collides or gets lost. */
let deck = [];            // ordered entries
let byId = {};            // id -> entry
let enriched = {};        // id -> enriched data (persisted overlay)
let progress = {};        // id -> 'learned' | 'learning'
let apiKey = '';
let tab = 'learn';
let queue = []; let qPos = 0; let flipped = false;
let filter = 'all'; let posFilter = 'all'; let search = ''; let expanded = null; let listLimit = 100;
let learnPos = 'all';     // POS filter for the Learn queue
let wordView = null;      // when set, Words tab shows a full card for this deck index
let wordViewStack = [];   // for synonym/antonym hyperlink navigation (back button)
let enrichInFlight = false;
let plan = null;          // {perDay, endDate, startDate} daily study plan
let streak = null;        // {count, lastStudied, todayCount, history:{date:count}}
let remindOn = false;
const GOAL = 5000;
const POS_LABELS = {verb:'Verbs', noun:'Nouns', adjective:'Adjectives', adverb:'Adverbs', pronoun:'Pronouns', preposition:'Prepositions', conjunction:'Conjunctions', number:'Numbers', expression:'Expressions', article:'Articles'};
function posOf(e){ return (e.t||'').toLowerCase(); }

function entryId(e){ return e.t ? (e.w.toLowerCase() + '|' + e.t) : e.w.toLowerCase(); }

function buildDeck(){
  deck = []; byId = {};
  const seedByWord = {};
  SEED.forEach(s => { (seedByWord[s.w.toLowerCase()] = seedByWord[s.w.toLowerCase()] || []).push(s); });
  const placed = new Set();
  FREQ.forEach((w, i) => {
    const hits = seedByWord[w];
    if(hits){
      hits.forEach(s => {
        const e = Object.assign({rank:i+1, rich:true}, s);
        e.id = entryId(e); deck.push(e); byId[e.id] = e;
      });
      placed.add(w);
    } else {
      const t = TRANS[w];
      const e = {w:w, rank:i+1, id:w, rich:false};
      if(t && t.m){ e.m = t.m; if(t.t) e.t = t.t; e.hasMeaning = true; }
      deck.push(e); byId[e.id] = e;
    }
  });
  // curated multiword entries not present in the frequency list
  SEED.forEach(s => {
    if(placed.has(s.w.toLowerCase())) return;
    const e = Object.assign({rank:0, rich:true}, s);
    e.id = entryId(e);
    if(!byId[e.id]){ deck.push(e); byId[e.id] = e; }
  });
  // apply enrichment overlay
  Object.keys(enriched).forEach(id => {
    const e = byId[id];
    if(e){ Object.assign(e, enriched[id]); e.rich = true; }
    else {
      const n = Object.assign({rank:0, rich:true, id:id}, enriched[id]);
      deck.push(n); byId[id] = n;
    }
  });
}

/* ============ MIGRATION from earlier versions ============ */
async function migrate(){
  // 1) old AI-generated words saved as full deck copies -> keep as enrichment overlay
  const oldWords = await Store.get('dutch5k-words');
  if(oldWords && Array.isArray(oldWords)){
    oldWords.forEach(x => {
      if(!x || !x.w) return;
      const id = x.t ? (x.w.toLowerCase() + '|' + x.t) : x.w.toLowerCase();
      const target = byId[id] || byId[x.w.toLowerCase()];
      const useId = target ? target.id : id;
      if(byId[useId] && byId[useId].rich) return; // curated wins
      const data = {w:x.w, t:x.t, m:x.m, ex:x.ex || []};
      if(x.a) data.a = x.a;
      if(typeof x.f === 'string' && x.f && x.f !== '\u2014') data.f = [['Forms', x.f]];
      else if(Array.isArray(x.f)) data.f = x.f;
      if(x.syn) data.syn = x.syn; if(x.ant) data.ant = x.ant;
      enriched[useId] = data;
    });
    await Store.set('dutch5k-enriched', enriched);
  }
  // 2) old progress keyed by plain word or word|type -> map to deck ids
  const oldProg = await Store.get('dutch5k-progress');
  if(oldProg && !oldProg.__v2){
    const np = {__v2:true};
    Object.keys(oldProg).forEach(k => {
      if(k === '__v2') return;
      const v = oldProg[k];
      if(byId[k]){ np[byId[k].id] = v; return; }
      const lk = k.toLowerCase();
      if(byId[lk]){ np[byId[lk].id] = v; return; }
      const m = deck.find(e => e.w.toLowerCase() === lk.split('|')[0]);
      if(m) np[m.id] = v;
    });
    progress = np;
    await Store.set('dutch5k-progress', progress);
  }
}

async function init(){
  enriched = (await Store.get('dutch5k-enriched')) || {};
  progress = (await Store.get('dutch5k-progress')) || {__v2:true};
  apiKey = (await Store.get('dutch5k-apikey')) || '';
  plan = (await Store.get('dutch5k-plan')) || null;
  streak = (await Store.get('dutch5k-streak')) || {count:0, lastStudied:null, history:{}};
  remindOn = (await Store.get('dutch5k-remind')) || false;
  buildDeck();
  await migrate();
  buildDeck(); // rebuild with any migrated enrichment applied
  buildQueue();
  render();
  maybeEnrichAhead();
  scheduleReminder();
  // Fill any remaining meanings in the background once online (few seconds after load)
  setTimeout(backgroundFill, 2500);
  window.addEventListener('online', ()=>setTimeout(backgroundFill, 1000));
}

/* ============ QUEUE ============ */
let skipped = new Set();  // deck indices skipped this session, pushed to the back
function buildQueue(){
  const learning=[], fresh=[], learned=[];
  deck.forEach((e,i)=>{
    if(learnPos!=='all' && posOf(e)!==learnPos) return;
    const s = progress[e.id];
    if(s==='learning') learning.push(i);
    else if(s==='learned') learned.push(i);
    else fresh.push(i);
  });
  shuffle(learning); shuffle(learned);
  // new words come in frequency order: most common Dutch first
  fresh.sort((a,b)=> (deck[a].rank||99999) - (deck[b].rank||99999));
  queue = [...learning, ...fresh, ...learned.slice(0, Math.max(3, Math.floor(learned.length*0.1)))];
  // move any skipped-this-session indices to the back
  if(skipped.size){
    const sk = queue.filter(i=>skipped.has(i));
    queue = queue.filter(i=>!skipped.has(i)).concat(sk);
  }
  qPos = 0; flipped = false;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }

function skipCard(){
  hap();
  if(!queue.length) return;
  const idx = queue[qPos];
  skipped.add(idx);
  // move current to the end of the queue
  queue.splice(qPos,1); queue.push(idx);
  if(qPos>=queue.length) qPos=0;
  flipped=false; render();
}

function counts(){
  let learned=0, learning=0;
  deck.forEach(e=>{ if(progress[e.id]==='learned') learned++; else if(progress[e.id]==='learning') learning++; });
  return {learned, learning, fresh: deck.length-learned-learning, total: deck.length};
}
function countsByPos(){
  const out={};
  deck.forEach(e=>{
    const p=posOf(e)||'other';
    if(!out[p]) out[p]={total:0,learned:0};
    out[p].total++;
    if(progress[e.id]==='learned') out[p].learned++;
  });
  return out;
}

/* ============ ACTIONS ============ */
async function mark(status){
  const e = deck[queue[qPos]];
  const wasLearned = progress[e.id]==='learned';
  if(status==='again'){ delete progress[e.id]; }
  else progress[e.id] = status;
  progress.__v2 = true;
  await Store.set('dutch5k-progress', progress);
  if(status==='learned' && !wasLearned){ await recordLearned(); }
  qPos++; flipped = false;
  if(qPos >= queue.length) buildQueue();
  render();
  maybeEnrichAhead();
}
function flip(){
  hap();
  const e = deck[queue[qPos]];
  if(!flipped && !e.rich){ maybeEnrichAhead(true); }
  flipped = !flipped; render();
}
function setTab(t){ hap(); tab=t; expanded=null; wordView=null; wordViewStack=[]; listLimit=100; render(); }
function setFilter(f){
  filter=f; listLimit=100;
  if(tab==='words' && document.getElementById('wlist')){
    document.querySelectorAll('.filters button').forEach(b=>{ b.className = (b.dataset.f===f)?'active':''; });
    renderWordList();
  } else render();
}
function setPosFilter(p){
  posFilter=p; listLimit=100;
  if(tab==='words' && document.getElementById('wlist')){
    document.querySelectorAll('.posfilters button').forEach(b=>{ b.className = (b.dataset.p===p)?'active':''; });
    renderWordList();
  } else render();
}
function setLearnPos(p){ learnPos=p; skipped=new Set(); buildQueue(); render(); }
function toast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ============ STREAK & DAILY PLAN ============ */
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }

async function recordLearned(){
  if(!streak) streak = {count:0, lastStudied:null, history:{}};
  const t = todayStr();
  streak.history[t] = (streak.history[t]||0) + 1;
  if(streak.lastStudied !== t){
    // update streak count
    if(streak.lastStudied && daysBetween(streak.lastStudied, t) === 1) streak.count += 1;
    else if(streak.lastStudied === null || daysBetween(streak.lastStudied, t) > 1) streak.count = 1;
    streak.lastStudied = t;
  } else if(streak.count === 0){ streak.count = 1; streak.lastStudied = t; }
  await Store.set('dutch5k-streak', streak);
  // if a daily goal is met, celebrate once
  if(plan && streak.history[t] === plan.perDay){ hap(30); toast('&#127881; Daily goal reached: '+plan.perDay+' words!'); }
}
function todayCount(){ return (streak && streak.history[todayStr()]) || 0; }
function currentStreak(){
  if(!streak || !streak.lastStudied) return 0;
  const d = daysBetween(streak.lastStudied, todayStr());
  return (d===0 || d===1) ? streak.count : 0;  // streak intact if studied today or yesterday
}

async function savePlan(perDay, endDate){
  plan = {perDay:perDay, endDate:endDate||null, startDate:todayStr()};
  await Store.set('dutch5k-plan', plan);
  scheduleReminder();
  render();
}
async function clearPlan(){ plan=null; await Store.set('dutch5k-plan', null); render(); }
function editPlan(){ plan=null; render(); }

/* Local reminder via Notification API (best-effort; browsers throttle background timers) */
async function enableReminders(){
  hap();
  if(!('Notification' in window)){ toast('Notifications not supported on this device'); return; }
  const perm = await Notification.requestPermission();
  if(perm==='granted'){ remindOn=true; toast('Daily reminders on'); await Store.set('dutch5k-remind', true); scheduleReminder(); }
  else toast('Reminder permission denied');
  render();
}
function scheduleReminder(){
  // If studied already today, remind tomorrow; else remind this evening.
  Store.get('dutch5k-remind').then(on=>{
    if(!on || !('Notification' in window) || Notification.permission!=='granted') return;
    // fire a gentle in-session check: if it's past 19:00 and no study today, notify now
    const now=new Date();
    if(now.getHours()>=19 && todayCount()===0){
      try{ new Notification('Dutch 5K', {body:'Time for today\u2019s words! Keep your streak going.'}); }catch(e){}
    }
  });
}

async function saveKey(v){
  apiKey = v.trim();
  await Store.set('dutch5k-apikey', apiKey);
  if(apiKey) toast('API key saved on this device');
  render();
}

/* ============ AI ENRICHMENT ============ */
function canCallApi(){ return Store.hasClaude || !!apiKey; }

function apiHeaders(){
  const h = {"Content-Type":"application/json"};
  if(!Store.hasClaude && apiKey){
    h["x-api-key"] = apiKey;
    h["anthropic-version"] = "2023-06-01";
    h["anthropic-dangerous-direct-browser-access"] = "true";
  }
  return h;
}

async function enrichWords(stubs){
  const list = stubs.map(e=>e.w).join(', ');
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers: apiHeaders(),
    body: JSON.stringify({
      model:"claude-sonnet-4-6", max_tokens: 4000,
      messages:[{role:"user", content:
`You are enriching a Dutch vocabulary flashcard deck for conversational fluency. Create one entry for each of these Dutch words: ${list}

Respond with ONLY a JSON array, no markdown, no preamble. Each item:
{"w":"the word exactly as given","a":"de or het (nouns only, else omit)","t":"verb|noun|adjective|adverb|pronoun|preposition|conjunction|number|expression","m":"concise English meaning(s)","f":[["Label","value"],...],"syn":["1-2 Dutch synonyms or []"],"ant":["Dutch antonym or []"],"ex":[["Natural everyday Dutch sentence","English translation"],["Second Dutch sentence","English translation"]]}

Forms labels: verbs get Present ("ik X, hij Xt"), Past ("sg/pl"), Perfect; nouns get Plural (and Diminutive if common); adjectives get Comparative, Superlative; others use [] if no forms. Sentences must be natural, everyday conversational Dutch. If a word is an inflected form or a name, still explain it (e.g. t "noun", m "plural of ...").`}]
    })
  });
  if(!resp.ok){
    const err = await resp.json().catch(()=>({}));
    throw new Error((err.error && err.error.message) || ('API error ' + resp.status));
  }
  const data = await resp.json();
  const text = (data.content||[]).filter(i=>i.type==='text').map(i=>i.text).join('\n');
  const clean = text.replace(/```json|```/g,'').trim();
  const batch = JSON.parse(clean);
  let n = 0;
  batch.forEach(x=>{
    if(!x || !x.w) return;
    const stub = stubs.find(s => s.w.toLowerCase() === x.w.toLowerCase());
    if(!stub) return;
    const data = {w:stub.w, t:x.t, m:x.m, f:Array.isArray(x.f)?x.f:[], ex:x.ex||[]};
    if(x.a) data.a = x.a;
    if(x.syn && x.syn.length) data.syn = x.syn;
    if(x.ant && x.ant.length) data.ant = x.ant;
    enriched[stub.id] = data;
    Object.assign(byId[stub.id], data); byId[stub.id].rich = true; byId[stub.id].hasMeaning = true;
    n++;
  });
  await Store.set('dutch5k-enriched', enriched);
  return n;
}

/* Silently prepare the next cards while you study */
async function maybeEnrichAhead(force){
  if(enrichInFlight || !canCallApi()) return;
  const upcoming = [];
  for(let i=qPos; i<Math.min(qPos+12, queue.length); i++){
    const e = deck[queue[i]];
    if(!e.rich) upcoming.push(e);
    if(upcoming.length >= 10) break;
  }
  if(!upcoming.length) return;
  if(!force && byId[deck[queue[qPos]].id].rich && upcoming.length < 4) return;
  enrichInFlight = true;
  try{
    await enrichWords(upcoming);
    enrichInFlight = false;
    render();
  }catch(e){
    console.error(e); enrichInFlight = false;
    toast('Card preparation failed &#8212; check your API key in Progress');
  }
}

/* Background: quietly fill meanings for the ~1,284 words with no baked translation.
   Runs a few seconds after load whenever the app can reach the API (inside Claude, or
   with a saved key). Each result is saved to enrichment, so a word is only ever
   translated once and then works offline forever. */
let bgFilling = false;
async function backgroundFill(){
  if(bgFilling || !canCallApi()) return;
  bgFilling = true;
  try{
    while(true){
      const need = deck.filter(e=>!e.rich && !e.hasMeaning)
                       .sort((a,b)=>(a.rank||99999)-(b.rank||99999))
                       .slice(0, 25);
      if(!need.length) break;
      const n = await enrichWords(need);
      // mark anything still unresolved so we don't loop forever on stubborn tokens
      need.forEach(e=>{ if(!e.rich && !e.hasMeaning){ e.hasMeaning = e.hasMeaning || false; } });
      if(!n){ break; }
      if(tab==='words' && document.getElementById('wlist')) renderWordList();
      else if(tab==='progress') render();
      await new Promise(r=>setTimeout(r, 1200)); // gentle pacing
    }
  }catch(e){ console.error('bgfill', e); }
  bgFilling = false;
}

/* Manual bulk enrichment from the Progress tab */
async function enrichBulk(btn){
  if(!canCallApi()){ toast('Add your Anthropic API key first'); return; }
  const stubs = deck.filter(e=>!e.rich).sort((a,b)=>(a.rank||99999)-(b.rank||99999)).slice(0,100);
  if(!stubs.length){ toast('All words already have full details!'); return; }
  btn.disabled = true;
  let done = 0;
  try{
    for(let i=0; i<stubs.length; i+=20){
      btn.textContent = 'Preparing words\u2026 ' + done + ' / ' + stubs.length;
      done += await enrichWords(stubs.slice(i, i+20));
    }
    toast('Prepared ' + done + ' words with full details');
  }catch(e){
    console.error(e);
    toast(done ? ('Prepared ' + done + ' before an error \u2014 tap again to continue') : 'Failed \u2014 check your API key and credit');
  }
  buildQueue(); render();
}

/* ============ EXPORT / IMPORT ============ */
function exportData(){
  const payload = {v:2, progress, enriched, exported:new Date().toISOString()};
  const blob = new Blob([JSON.stringify(payload)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dutch5k-backup.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importData(){
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='application/json';
  inp.onchange = async () => {
    try{
      const txt = await inp.files[0].text();
      const d = JSON.parse(txt);
      if(d.progress){ Object.assign(progress, d.progress); progress.__v2 = true; }
      if(d.enriched){ Object.assign(enriched, d.enriched); }
      await Store.set('dutch5k-progress', progress);
      await Store.set('dutch5k-enriched', enriched);
      buildDeck(); buildQueue(); render();
      toast('Progress imported');
    }catch(e){ toast('Import failed \u2014 not a valid backup file'); }
  };
  inp.click();
}

/* ============ RENDER ============ */
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function mondrianStrip(c){
  const total = Math.max(c.total,1);
  const pl = Math.max((c.learned/total)*100, c.learned?2:0);
  const pg = Math.max((c.learning/total)*100, c.learning?2:0);
  const pn = Math.max(100-pl-pg, 0);
  return `<div class="mstrip" title="blue = learned, yellow = learning, white = new">
    ${c.learned?`<div class="m-learned" style="width:${pl}%"></div>`:''}
    ${c.learning?`<div class="m-learning" style="width:${pg}%"></div>`:''}
    <div class="m-new" style="width:${pn}%"></div>
  </div>`;
}

function formsHtml(e){
  if(!Array.isArray(e.f) || !e.f.length) return '';
  return `<div class="section"><div class="sec-h">Forms</div>` + e.f.map(p=>`<div class="frow"><b>${esc(p[0])}</b> ${esc(p[1])}</div>`).join('') + `</div>`;
}

/* Find a deck index for a Dutch word (prefers an entry that has a meaning) */
function findWordIndex(word){
  const lw = String(word).toLowerCase().trim();
  let best = -1;
  for(let i=0;i<deck.length;i++){
    if(deck[i].w.toLowerCase() === lw){
      if(deck[i].rich || deck[i].hasMeaning) return i;
      if(best<0) best = i;
    }
  }
  return best;
}
function relatedMeaning(word){
  const i = findWordIndex(word);
  if(i>=0 && (deck[i].rich || deck[i].hasMeaning)) return deck[i].m;
  return '';
}
/* Render a synonym/antonym row: hyperlink if the word is in our deck, else plain */
function relRow(word, kind){
  const idx = findWordIndex(word);
  const mean = relatedMeaning(word);
  const label = kind==='syn' ? '=' : '&#8800;';
  const cls = kind==='syn' ? 'rel-syn' : 'rel-ant';
  const meanHtml = mean ? `<span class="rel-m">${esc(mean)}</span>` : '';
  if(idx>=0){
    return `<div class="rel ${cls}" onclick="hap();openWord(${idx},true)"><span class="rel-w">${label} ${esc(word)}</span>${meanHtml}<span class="rel-go">&#8250;</span></div>`;
  }
  return `<div class="rel ${cls} rel-plain"><span class="rel-w">${label} ${esc(word)}</span>${meanHtml}</div>`;
}
function synAntHtml(e){
  const syn = (e.syn||[]);
  const ant = (e.ant||[]);
  if(!syn.length && !ant.length) return '';
  let out = '';
  if(syn.length){
    out += `<div class="section"><div class="sec-h">Synonyms</div>` + syn.map(s=>relRow(s,'syn')).join('') + `</div>`;
  }
  if(ant.length){
    out += `<div class="section"><div class="sec-h">Antonyms</div>` + ant.map(s=>relRow(s,'ant')).join('') + `</div>`;
  }
  return out;
}
function examplesHtml(e){
  if(!e.ex || !e.ex.length) return '';
  return `<div class="section"><div class="sec-h">Examples</div>` +
    e.ex.map(sn=>`<div class="sentence">${esc(sn[0])}<em>${esc(sn[1])}</em></div>`).join('') + `</div>`;
}
/* Legacy chip view kept for compact contexts */
function chipsHtml(e){
  const syn = (e.syn||[]).map(s=>`<span class="chip syn">= ${esc(s)}</span>`).join('');
  const ant = (e.ant||[]).map(s=>`<span class="chip ant">&#8800; ${esc(s)}</span>`).join('');
  return (syn||ant) ? `<div class="chips">${syn}${ant}</div>` : '';
}

/* Open a word's detail card. fromLink=true pushes current view onto a back-stack. */
function openWord(idx, fromLink){
  if(fromLink && wordView!==null) wordViewStack.push(wordView);
  wordView = idx;
  if(tab!=='words'){ tab='words'; }
  render();
  try{ window.scrollTo(0,0); }catch(e){}
}
function backFromWord(){
  hap();
  if(wordViewStack.length){ wordView = wordViewStack.pop(); }
  else { wordView = null; }
  render();
  try{ window.scrollTo(0,0); }catch(e){}
}

/* Haptic feedback for taps (Vibration API; silently no-ops where unsupported) */
function hap(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms||10); }catch(e){} }

/* Words list: updates only the list container, so the search box keeps focus */
function renderWordList(){
  const listEl = document.getElementById('wlist');
  const moreEl = document.getElementById('wmore');
  if(!listEl) return;
  const q = search.toLowerCase().trim();
  const list = [];
  for(let i=0;i<deck.length;i++){
    const e = deck[i];
    const s = progress[e.id] || 'new';
    if(filter!=='all' && s!==filter) continue;
    if(posFilter!=='all' && posOf(e)!==posFilter) continue;
    if(q && !(e.w.toLowerCase().includes(q) || (e.m||'').toLowerCase().includes(q))) continue;
    list.push(i);
  }
  const shown = list.slice(0, listLimit);
  listEl.innerHTML = shown.map(i=>{
    const e = deck[i]; const s = progress[e.id]||'new';
    const meaning = (e.rich || e.hasMeaning) ? esc(e.m) : `#${e.rank} &#183; tap to open`;
    const pos = posOf(e) ? `<span class="wpos">${esc(posOf(e))}</span>` : '';
    return `<div class="wrow" onclick="hap();openWord(${i})">
        <div><div class="nl">${e.a?esc(e.a)+' ':''}${esc(e.w)} ${pos}</div><div class="en">${meaning}</div></div>
        <div class="dot ${s}" title="${s}"></div>
      </div>`;
  }).join('') || '<div class="empty">No words match.</div>';
  moreEl.innerHTML = list.length > listLimit
    ? `<button class="loadmore" onclick="hap();listLimit+=300;renderWordList();">Show more (${list.length - listLimit} remaining)</button>`
    : `<div class="deckinfo">${list.length} word${list.length===1?'':'s'}</div>`;
}

/* Mark status from the Words detail card; stay on the card so you can keep reading */
async function setWordStatus(idx, status){
  const e = deck[idx];
  if(status==='again') delete progress[e.id]; else progress[e.id] = status;
  progress.__v2 = true;
  await Store.set('dutch5k-progress', progress);
  if(status==='learned') await recordLearned();
  buildQueue();
  render();
}

function render(){
  const c = counts();
  document.getElementById('hdrCount').textContent = `${c.learned} / ${GOAL}`;
  ['learn','words','progress'].forEach(t=>{
    document.getElementById('tab'+t[0].toUpperCase()+t.slice(1)).className = (tab===t)?'active':'';
  });
  const main = document.getElementById('main');

  if(tab==='learn'){
    const posBar = `<div class="posfilters learn-pos">
      <button class="${learnPos==='all'?'active':''}" onclick="hap();setLearnPos('all')">All</button>
      ${['verb','noun','adjective','adverb'].map(p=>`<button class="${learnPos===p?'active':''}" onclick="hap();setLearnPos('${p}')">${POS_LABELS[p]}</button>`).join('')}
    </div>`;
    if(!queue.length){
      main.innerHTML = posBar + `<div class="empty">No ${learnPos==='all'?'':POS_LABELS[learnPos].toLowerCase()+' '}words left in this round. ${learnPos!=='all'?'<br>Try “All” or another type.':''}</div>`;
      return;
    }
    const e = deck[queue[qPos]];
    const status = progress[e.id] || 'new';
    const rankTxt = e.rank ? `#${e.rank} most frequent` : 'curated extra';
    let back;
    if(e.rich){
      back = `
        <div class="word-en">${esc(e.m)}</div>
        ${formsHtml(e)}
        ${examplesHtml(e)}
        ${synAntHtml(e)}`;
    } else if(e.hasMeaning){
      back = `
        <div class="word-en">${esc(e.m)}</div>
        ${synAntHtml(e)}
        <div class="word-hint" style="margin-top:14px">More examples and grammar forms are being added.</div>`;
    } else if(enrichInFlight){
      back = `<div class="word-en">Preparing this card&#8230;</div>`;
    } else {
      back = `<div class="word-en">Not translated yet</div>`;
    }
    const dailyLine = plan ? `<div class="deckinfo">Today: <b>${todayCount()}</b>${plan.perDay?` / ${plan.perDay}`:''} learned &#183; streak <b>${currentStreak()}</b> &#128293;</div>` : '';
    main.innerHTML = posBar + `
      ${mondrianStrip(c)}
      <div class="card" tabindex="0" role="button" aria-label="Flip card" onclick="flip()">
        <div class="card-tag"><span>${esc(e.t||'word')}${e.a?` &#183; ${esc(e.a)}`:''}</span><span>${status.toUpperCase()}</span></div>
        <div class="card-body">
          <div class="word-nl">${esc(e.w)}</div>
          <div class="rankline">${rankTxt}</div>
          ${flipped ? back : `<div class="word-hint">Tap to reveal meaning, forms, examples &amp; related words</div>`}
        </div>
      </div>
      ${flipped ? `
      <div class="actions">
        <button class="btn-again" onclick="event&&event.stopPropagation();hap();mark('again')">&#10007; Again</button>
        <button class="btn-learning" onclick="event&&event.stopPropagation();hap();mark('learning')">&#8776; Learning</button>
        <button class="btn-know" onclick="event&&event.stopPropagation();hap();mark('learned')">&#10003; Know it</button>
      </div>
      <div class="actions"><button class="btn-skip" onclick="event&&event.stopPropagation();skipCard()">&#8631; Skip for now</button></div>` : `
      <div class="actions">
        <button onclick="flip()">Show answer</button>
        <button class="btn-skip" onclick="event&&event.stopPropagation();skipCard()">&#8631; Skip</button>
      </div>`}
      <div class="deckinfo">Card ${qPos+1} of ${queue.length} in this round &#183; ${c.total} words in deck</div>
      ${dailyLine}
    `;
  }

  if(tab==='words'){
    // Detail card view for a tapped word
    if(wordView !== null && deck[wordView]){
      const e = deck[wordView];
      const s = progress[e.id] || 'new';
      const rankTxt = e.rank ? `#${e.rank} most frequent` : 'curated extra';
      let body;
      if(e.rich || e.hasMeaning){
        body = `
          <div class="word-en">${esc(e.m || '')}</div>
          <div class="rankline">${rankTxt}</div>
          ${formsHtml(e)}
          ${examplesHtml(e)}
          ${synAntHtml(e)}
          ${(!e.rich && e.hasMeaning && !(e.ex&&e.ex.length)) ? `<div class="word-hint" style="margin-top:14px">More examples and grammar forms are being added.</div>` : ''}`;
      } else if(enrichInFlight){
        body = `<div class="word-en">Preparing&#8230;</div><div class="rankline">${rankTxt}</div>`;
      } else {
        body = `<div class="word-en">Not translated yet</div><div class="rankline">${rankTxt}</div>`;
      }
      const backLabel = wordViewStack.length ? '&#8592; Back' : '&#8592; Back to list';
      main.innerHTML = `
        <button class="loadmore" style="margin-top:0;margin-bottom:14px" onclick="backFromWord()">${backLabel}</button>
        <div class="card">
          <div class="card-tag"><span>${esc(e.t||'word')}${e.a?` &#183; ${esc(e.a)}`:''}</span><span>${s.toUpperCase()}</span></div>
          <div class="card-body">
            <div class="word-nl">${esc(e.w)}</div>
            ${body}
          </div>
        </div>
        <div class="actions">
          <button class="btn-again" onclick="hap();setWordStatus(${wordView},'again')">&#10007; Again</button>
          <button class="btn-learning" onclick="hap();setWordStatus(${wordView},'learning')">&#8776; Learning</button>
          <button class="btn-know" onclick="hap();setWordStatus(${wordView},'learned')">&#10003; Know it</button>
        </div>`;
      return;
    }
    // List view — rendered once; search updates only the list, never the input
    const posButtons = ['all','verb','noun','adjective','adverb','pronoun','preposition','conjunction','number','expression']
      .map(p=>`<button data-p="${p}" class="${posFilter===p?'active':''}" onclick="hap();setPosFilter('${p}')">${p==='all'?'All types':(POS_LABELS[p]||p)}</button>`).join('');
    main.innerHTML = `
      <input type="search" id="wordSearch" placeholder="Search Dutch or English&#8230;" autocomplete="off" value="${esc(search)}">
      <div class="filters">
        ${['all','new','learning','learned'].map(f=>`<button data-f="${f}" class="${filter===f?'active':''}" onclick="hap();setFilter('${f}')">${f}</button>`).join('')}
      </div>
      <div class="posfilters posscroll">${posButtons}</div>
      <div class="wlist" id="wlist"></div>
      <div id="wmore"></div>`;
    const inp = document.getElementById('wordSearch');
    inp.oninput = () => { search = inp.value; listLimit = 100; renderWordList(); };
    renderWordList();
    return;
  }

  if(tab==='progress'){
    const pct = ((c.learned/GOAL)*100).toFixed(1);
    const withMeaning = deck.filter(e=>e.rich || e.hasMeaning).length;
    const full = deck.filter(e=>e.rich).length;
    const remaining = deck.length - withMeaning;
    const tc = todayCount();
    const st = currentStreak();

    // Daily plan box
    let planBox;
    if(plan){
      const remainingWords = GOAL - c.learned;
      let etaLine = '';
      if(plan.perDay>0){
        const days = Math.ceil(remainingWords / plan.perDay);
        const eta = new Date(Date.now() + days*86400000);
        etaLine = `At ${plan.perDay}/day you'll reach 5,000 in about <b>${days}</b> days (~${eta.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}).`;
      }
      if(plan.endDate){
        const daysLeft = Math.max(1, daysBetween(todayStr(), plan.endDate));
        const need = Math.ceil(remainingWords / daysLeft);
        etaLine = `To hit 5,000 by ${new Date(plan.endDate).toLocaleDateString(undefined,{month:'short',day:'numeric'})}, learn about <b>${need}</b>/day (${daysLeft} days left).`;
      }
      const done = tc; const goalN = plan.perDay || (plan.endDate ? Math.ceil((GOAL-c.learned)/Math.max(1,daysBetween(todayStr(),plan.endDate))) : 10);
      const barPct = Math.min(100, Math.round(done/goalN*100));
      planBox = `
      <div class="genbox plan-box">
        <h3>Today's plan</h3>
        <div class="daily-head"><div><div class="daily-num">${done} <span>/ ${goalN}</span></div><div class="lbl">words today</div></div>
          <div class="streak-badge">&#128293; ${st}<small>day streak</small></div></div>
        <div class="progbar"><div class="progbar-fill" style="width:${barPct}%"></div></div>
        <p style="margin-top:12px">${etaLine}</p>
        ${done>=goalN?`<div class="keyok" style="margin-top:8px">&#10003; Daily goal complete &#8212; nice work!</div>`:`<button class="genbtn" style="margin-top:10px" onclick="hap();setTab('learn')">Study now &#8594;</button>`}
        <div class="rowbtns" style="margin-top:10px">
          <button onclick="hap();editPlan()">Edit plan</button>
          <button onclick="hap();clearPlan()">Remove</button>
        </div>
        ${('Notification' in window) ? `<button class="loadmore" style="margin-top:10px" onclick="enableReminders()">${remindOn?'&#10003; Daily reminders on':'&#128276; Turn on daily reminders'}</button>` : ''}
      </div>`;
    } else {
      planBox = `
      <div class="genbox plan-box">
        <h3>Set a daily goal</h3>
        <p>Pick how many words to learn per day (or a target date), and the app tracks your streak and shows exactly how many to do each day.</p>
        <div class="plan-form">
          <label>Words per day</label>
          <div class="chiprow">
            ${[5,10,15,20,30].map(n=>`<button class="planchip" onclick="hap();savePlan(${n},null)">${n}</button>`).join('')}
          </div>
          <label style="margin-top:12px">Or reach 5,000 by a date</label>
          <input type="date" id="planDate" min="${todayStr()}">
          <button class="genbtn" style="margin-top:10px" onclick="hap();const d=document.getElementById('planDate').value; if(d) savePlan(0,d); else toast('Pick a date or tap a number above');">Set target date</button>
        </div>
      </div>`;
    }

    // Streak history mini-calendar (last 14 days)
    const hist = (streak && streak.history) || {};
    let histCells = '';
    for(let k=13;k>=0;k--){
      const d = new Date(Date.now()-k*86400000);
      const ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      const n = hist[ds]||0;
      const lvl = n===0?0:n<5?1:n<10?2:3;
      histCells += `<div class="histcell lvl${lvl}" title="${ds}: ${n} words"></div>`;
    }

    // POS breakdown
    const cbp = countsByPos();
    const posOrder = ['verb','noun','adjective','adverb','pronoun','preposition','conjunction','number','expression','article'];
    const posRows = posOrder.filter(p=>cbp[p]).map(p=>{
      const d=cbp[p]; const pc=Math.round(d.learned/d.total*100);
      return `<div class="posrow" onclick="hap();posFilter='${p}';setTab('words')">
        <span class="posname">${POS_LABELS[p]||p}</span>
        <span class="posbar"><span class="posbar-fill" style="width:${pc}%"></span></span>
        <span class="poscount">${d.learned}/${d.total}</span></div>`;
    }).join('');

    main.innerHTML = `
      ${mondrianStrip(c)}
      <div class="stats">
        <div class="stat"><div class="num c-blue">${c.learned}</div><div class="lbl">Learned</div></div>
        <div class="stat"><div class="num c-yellow">${c.learning}</div><div class="lbl">Still learning</div></div>
        <div class="stat"><div class="num">${c.fresh}</div><div class="lbl">Not started</div></div>
        <div class="stat"><div class="num c-red">${pct}%</div><div class="lbl">Of 5,000 goal</div></div>
      </div>

      ${planBox}

      <div class="genbox">
        <h3>Last 14 days</h3>
        <div class="histgrid">${histCells}</div>
        <div class="note">Each square is a day; darker means more words learned. Learn at least one word a day to keep your streak alive.</div>
      </div>

      <div class="genbox">
        <h3>By word type</h3>
        <div class="posbreak">${posRows}</div>
        <div class="note">Tap a type to study or browse just those words.</div>
      </div>

      <div class="genbox">
        <h3>Dictionary</h3>
        <p>All <b>5,000</b> words are in your deck in real frequency order. <b>${withMeaning}</b> have English meanings built in and work fully offline. ${remaining>0?`The remaining <b>${remaining}</b> fill in automatically in the background whenever you're online.`:`Every word has a meaning &#8212; fully offline-ready.`}</p>
        <p style="margin-top:4px">${full} words also have example sentences and grammar forms.</p>
        ${Store.hasClaude ? `<div class="keyok">Running inside Claude &#8212; no API key needed.</div>` : (apiKey ? `<div class="keyok">&#10003; API key saved on this device</div>` : '')}
        <button class="genbtn" onclick="hap();enrichBulk(this)">Add sentences &amp; forms for next 100</button>
        <div class="note">The app works offline without a key. A key only adds examples and grammar forms faster; it's stored only in this browser.</div>
      </div>

      <div class="genbox">
        <h3>Backup</h3>
        <p>Your progress lives in this browser. Export a backup before switching phones, then import it there.</p>
        <div class="rowbtns">
          <button onclick="hap();exportData()">Export</button>
          <button onclick="hap();importData()">Import</button>
        </div>
      </div>`;
  }
}

/* ============ OFFLINE (service worker) ============ */
if('serviceWorker' in navigator){
  const swCode = `
    const C = 'dutch5k-v4';
    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
    self.addEventListener('fetch', e => {
      const url = e.request.url;
      // never cache the Anthropic API
      if(url.includes('api.anthropic.com')) return;
      e.respondWith(
        caches.open(C).then(cache =>
          cache.match(e.request).then(hit => {
            const net = fetch(e.request).then(resp => {
              if(resp && resp.status===200 && (e.request.method==='GET')){ cache.put(e.request, resp.clone()); }
              return resp;
            }).catch(()=> hit);
            return hit || net;
          })
        )
      );
    });`;
  try{
    const blob = new Blob([swCode], {type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }catch(e){}
}

init();
</script>
</body>
</html>
